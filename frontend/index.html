<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body onload="loadStudents()">
  <div class="container">
    <h1>Student Management System</h1>
    <p>3-Tier DevOps Web Application</p>

    <div class="form-box">
      <input type="hidden" id="studentId" />

      <input type="text" id="name" placeholder="Enter Student Name" />
      <input type="email" id="email" placeholder="Enter Email Address" />
      <input type="text" id="course" placeholder="Enter Course Name" />
      <input type="number" id="marks" placeholder="Enter Marks" />

      <button id="submitBtn" onclick="addOrUpdateStudent()">Add Student</button>
      <button onclick="clearForm()">Clear</button>
    </div>

    <h2>Student Details</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Course</th>
          <th>Marks</th>
          <th>Grade</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="studentTable">
        <!-- Student data will load here -->
      </tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
